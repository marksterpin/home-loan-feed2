name: Harvest CDR home-loan data

# Runs nightly and publishes public/products.json to GitHub Pages.
on:
  schedule:
    - cron: "0 17 * * *"   # 17:00 UTC ~ 03:00/04:00 AEST/AEDT
  workflow_dispatch: {}     # manual "Run workflow" button

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  harvest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run harvester
        run: node harvest.js
        env:
          OUT: public
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    needs: harvest
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
